<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>娱乐投注平台 - 管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #1a1a2e; --secondary: #16213e; --accent: #0f3460;
    --gold: #d4af37; --gold-light: #f4d03f; --red: #e74c3c;
    --green: #27ae60; --white: #ffffff; --gray: #95a5a6;
    --dark-bg: #0d1117; --card-bg: #161b22; --border: #30363d;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--dark-bg); color: var(--white); min-height: 100vh; line-height: 1.6;
}
.hidden { display: none !important; }

/* 登录页 */
.login-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
    padding: 20px;
}
.login-container {
    background: var(--card-bg); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px;
    border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.login-logo { text-align: center; margin-bottom: 30px; }
.login-logo h1 { font-size: 32px; color: var(--gold); margin-bottom: 10px; }
.login-logo p { color: var(--gray); font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--gray); }
.form-input {
    width: 100%; padding: 12px 16px; background: var(--dark-bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--white); font-size: 14px;
}
.form-input:focus { outline: none; border-color: var(--gold); }
.btn {
    padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 500; transition: all 0.3s; text-decoration: none;
    display: inline-block; text-align: center;
}
.btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--primary); width: 100%; padding: 14px; font-size: 16px;
}
.btn-secondary { background: var(--accent); color: var(--white); }
.btn-danger { background: var(--red); color: var(--white); }
.btn-success { background: var(--green); color: var(--white); }
.btn-sm { padding: 6px 16px; font-size: 12px; }

/* 管理后台布局 */
.admin-app { display: flex; min-height: 100vh; }
.sidebar {
    width: 260px; background: var(--primary); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: fixed; height: 100vh;
}
.sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 20px; color: var(--gold); margin-bottom: 4px; }
.sidebar-header p { font-size: 12px; color: var(--gray); }
.sidebar-nav { flex: 1; padding: 16px 0; }
.sidebar-nav-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    color: var(--gray); text-decoration: none; font-size: 14px; transition: all 0.3s;
}
.sidebar-nav-item:hover, .sidebar-nav-item.active { background: var(--accent); color: var(--white); }
.sidebar-nav-icon { font-size: 18px; }
.sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
.main-content { margin-left: 260px; flex: 1; padding: 24px; }

/* 页面头部 */
.page-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.page-title { font-size: 24px; color: var(--gold); }

/* 统计卡片 */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
.stat-card {
    background: var(--card-bg); border-radius: 12px; padding: 20px;
    border: 1px solid var(--border); display: flex; align-items: center; gap: 16px;
}
.stat-icon { font-size: 32px; }
.stat-value { font-size: 28px; font-weight: bold; color: var(--gold); }
.stat-label { font-size: 14px; color: var(--gray); }

/* 卡片 */
.card {
    background: var(--card-bg); border-radius: 12px; padding: 20px;
    margin-bottom: 20px; border: 1px solid var(--border);
}
.card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border);
}
.card-title { font-size: 18px; font-weight: bold; color: var(--gold); }

/* 数据表格 */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th { color: var(--gray); font-weight: 500; font-size: 13px; }
.data-table td { font-size: 14px; }

/* 操作按钮 */
.action-btns { display: flex; gap: 8px; }
.action-btn {
    padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: all 0.3s;
}
.action-btn-success { background: var(--green); color: white; }
.action-btn-warning { background: #f39c12; color: white; }
.action-btn-danger { background: var(--red); color: white; }
.action-btn-balance { background: var(--gold); color: var(--primary); }

/* 标签 */
.tag { padding: 4px 10px; border-radius: 4px; font-size: 12px; }
.tag-success { background: rgba(39,174,96,0.2); color: var(--green); }
.tag-danger { background: rgba(231,76,60,0.2); color: var(--red); }
.tag-warning { background: rgba(243,156,18,0.2); color: #f39c12; }

/* 搜索栏 */
.search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
.search-input { flex: 1; }

/* 空状态 */
.empty-state { text-align: center; padding: 40px; color: var(--gray); }

/* 模态框 */
.modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
    z-index: 2000;
}
.modal-overlay.show { display: flex; }
.modal-content {
    background: var(--card-bg); border-radius: 16px; padding: 24px;
    width: 90%; max-width: 480px; border: 1px solid var(--border);
}
.modal-header { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: var(--gold); }
.modal-body { margin-bottom: 20px; }
.modal-footer { display: flex; gap: 12px; justify-content: flex-end; }

/* Toast */
.toast-container {
    position: fixed; top: 20px; right: 20px; z-index: 3000;
    display: flex; flex-direction: column; gap: 10px;
}
.toast {
    padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px;
    animation: slideIn 0.3s ease; max-width: 300px;
}
.toast-success { background: var(--green); }
.toast-error { background: var(--red); }
@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* 滑块 */
input[type="range"] {
    width: 100%; height: 6px; border-radius: 3px;
    background: var(--border); outline: none; -webkit-appearance: none;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); cursor: pointer;
}
.range-value { text-align: center; font-size: 24px; color: var(--gold); font-weight: bold; margin: 10px 0; }

@media (max-width: 768px) {
    .sidebar { width: 100%; position: relative; height: auto; }
    .main-content { margin-left: 0; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
    <!-- 管理后台登录 -->
    <div id="adminLoginPage" class="login-page">
        <div class="login-container">
            <div class="login-logo">
                <h1>⚙️ 管理后台</h1>
                <p>娱乐投注平台管理系统</p>
            </div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label class="form-label">管理员账号</label>
                    <input type="text" class="form-input" id="adminUsername" placeholder="请输入管理员账号" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
        </div>
    </div>

    <!-- 管理后台应用 -->
    <div id="adminApp" class="admin-app hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>⚙️ 管理后台</h1>
                <p>娱乐平台管理系统</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-nav-item active" onclick="showAdminPage('dashboard'); return false;"><span class="sidebar-nav-icon">📊</span><span>仪表盘</span></a>
                <a href="#" class="sidebar-nav-item" onclick="showAdminPage('users'); return false;"><span class="sidebar-nav-icon">👥</span><span>用户管理</span></a>
                <a href="#" class="sidebar-nav-item" onclick="showAdminPage('withdrawals'); return false;"><span class="sidebar-nav-icon">💰</span><span>提现管理</span></a>
                <a href="#" class="sidebar-nav-item" onclick="showAdminPage('bets'); return false;"><span class="sidebar-nav-icon">📝</span><span>投注记录</span></a>
                <a href="#" class="sidebar-nav-item" onclick="showAdminPage('settings'); return false;"><span class="sidebar-nav-icon">⚙️</span><span>系统设置</span></a>
            </nav>
            <div class="sidebar-footer">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--primary);">👤</div>
                    <div><div style="font-size: 14px; font-weight: 500;" id="adminName">管理员</div><div style="font-size: 12px; color: var(--gray);">超级管理员</div></div>
                </div>
                <button class="btn btn-danger" style="width: 100%;" onclick="logout()">退出登录</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- 仪表盘 -->
            <div id="admin-dashboard" class="admin-section">
                <div class="page-header">
                    <h1 class="page-title">📊 仪表盘</h1>
                    <span id="currentTime"></span>
                </div>
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-value" id="dashTotalUsers">0</div><div class="stat-label">总用户数</div></div></div>
                    <div class="stat-card"><div class="stat-icon">📝</div><div><div class="stat-value" id="dashTotalBets">0</div><div class="stat-label">总投注数</div></div></div>
                    <div class="stat-card"><div class="stat-icon">💰</div><div><div class="stat-value" id="dashTotalAmount">¥0</div><div class="stat-label">总投注金额</div></div></div>
                    <div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-value" id="dashWinRate">0%</div><div class="stat-label">平均胜率</div></div></div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">👥 最近注册用户</span></div>
                    <div id="dashRecentUsers"></div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header"><span class="card-title">📝 最近投注记录</span></div>
                    <div id="dashRecentBets"></div>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="admin-users" class="admin-section hidden">
                <div class="page-header">
                    <h1 class="page-title">👥 用户管理</h1>
                    <button class="btn btn-primary" onclick="showAddUserModal()">➕ 添加用户</button>
                </div>
                <div class="search-bar">
                    <input type="text" class="form-input search-input" id="userSearchInput" placeholder="搜索用户名...">
                    <button class="btn btn-secondary" onclick="searchUsers()">🔍 搜索</button>
                </div>
                <div class="card"><div id="adminUsersList"></div></div>
            </div>

            <!-- 提现管理 -->
            <div id="admin-withdrawals" class="admin-section hidden">
                <div class="page-header"><h1 class="page-title">💰 提现管理</h1></div>
                <div class="search-bar">
                    <select class="form-input" id="withdrawStatusFilter" style="width: 150px;" onchange="loadAdminWithdrawals()">
                        <option value="all">全部状态</option>
                        <option value="pending">⏳ 审核中</option>
                        <option value="approved">✅ 已通过</option>
                        <option value="rejected">❌ 已拒绝</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadAdminWithdrawals()">🔄 刷新</button>
                </div>
                <div id="adminWithdrawalsList"></div>
            </div>

            <!-- 投注记录 -->
            <div id="admin-bets" class="admin-section hidden">
                <div class="page-header"><h1 class="page-title">📝 投注记录</h1></div>
                <div class="search-bar">
                    <input type="text" class="form-input search-input" id="betSearchInput" placeholder="搜索用户名或赛事...">
                    <select class="form-input" id="betStatusFilter" style="width: 120px;">
                        <option value="">全部状态</option><option value="pending">进行中</option><option value="win">已中奖</option><option value="lose">未中奖</option>
                    </select>
                    <button class="btn btn-secondary" onclick="searchAdminBets()">🔍 搜索</button>
                </div>
                <div class="card"><div id="adminBetsList"></div></div>
            </div>

            <!-- 系统设置 -->
            <div id="admin-settings" class="admin-section hidden">
                <div class="page-header"><h1 class="page-title">⚙️ 系统设置</h1></div>
                <div class="card">
                    <div class="card-header"><span class="card-title">🎯 全局获胜率设置</span></div>
                    <div style="padding: 20px;">
                        <label class="form-label">全局获胜率: <span id="globalWinRateValue">50%</span></label>
                        <input type="range" id="globalWinRate" min="0" max="100" value="50" oninput="document.getElementById('globalWinRateValue').textContent = this.value + '%'">
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="saveGlobalWinRate()">💾 保存全局设置</button>
                    </div>
                </div>
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header"><span class="card-title">👤 用户单独获胜率</span></div>
                    <div style="padding: 20px;">
                        <div class="form-group">
                            <label class="form-label">选择用户</label>
                            <select class="form-input" id="winRateUserSelect" onchange="loadUserWinRate()">
                                <option value="">请选择用户</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">获胜率: <span id="userWinRateValue">50%</span></label>
                            <input type="range" id="userWinRate" min="0" max="100" value="50" oninput="document.getElementById('userWinRateValue').textContent = this.value + '%'">
                        </div>
                        <div style="display: flex; gap: 12px;">
                            <button class="btn btn-primary" onclick="saveUserWinRate()">💾 保存用户设置</button>
                            <button class="btn btn-secondary" onclick="resetUserWinRate()">🔄 重置为全局</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">标题</div>
            <div class="modal-body" id="modalBody">内容</div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

<script>
// ==================== 数据存储 ====================
const Storage = {
    getUsers: () => JSON.parse(localStorage.getItem('bp_users') || '[]'),
    saveUsers: (users) => localStorage.setItem('bp_users', JSON.stringify(users)),
    getUser: (id) => Storage.getUsers().find(u => u.id === id),
    getUserByName: (username) => Storage.getUsers().find(u => u.username === username),
    addUser: (user) => {
        const users = Storage.getUsers();
        const newUser = { ...user, id: Date.now(), createdAt: new Date().toISOString(), balance: user.balance || 0, role: user.role || 'user', banned: false };
        users.push(newUser);
        Storage.saveUsers(users);
        return newUser;
    },
    updateUser: (id, data) => {
        const users = Storage.getUsers();
        const idx = users.findIndex(u => u.id === id);
        if (idx !== -1) { users[idx] = { ...users[idx], ...data }; Storage.saveUsers(users); }
    },
    deleteUser: (id) => {
        const users = Storage.getUsers().filter(u => u.id !== id);
        Storage.saveUsers(users);
    },
    getBets: () => JSON.parse(localStorage.getItem('bp_bets') || '[]'),
    addBet: (bet) => {
        const bets = Storage.getBets();
        bets.push({ ...bet, id: Date.now(), createdAt: new Date().toISOString() });
        localStorage.setItem('bp_bets', JSON.stringify(bets));
    },
    getCurrentUser: () => {
        const data = localStorage.getItem('bp_currentUser');
        return data ? JSON.parse(data) : null;
    },
    setCurrentUser: (user) => localStorage.setItem('bp_currentUser', JSON.stringify(user)),
    clearCurrentUser: () => localStorage.removeItem('bp_currentUser'),
    clearAll: () => { localStorage.removeItem('bp_users'); localStorage.removeItem('bp_bets'); localStorage.removeItem('bp_currentUser'); localStorage.removeItem('bp_withdrawals'); localStorage.removeItem('bp_globalWinRate'); }
};

// ==================== 工具函数 ====================
let currentUser = null;
let modalCallback = null;

function formatMoney(amount) {
    return '¥' + (amount || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatTime(date) {
    return new Date(date).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function showToast(message, type) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + (type || 'success');
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function showModal(title, content, onConfirm) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = content;
    modalCallback = onConfirm;
    document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); modalCallback = null; }

function confirmModal() { if (modalCallback) { const cb = modalCallback; modalCallback = null; cb(); } closeModal(); }

// ==================== 页面切换 ====================
function showAdminPage(page) {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.add('hidden'));
    document.getElementById('admin-' + page).classList.remove('hidden');
    document.querySelectorAll('.sidebar-nav-item').forEach(item => item.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if (page === 'dashboard') loadDashboard();
    else if (page === 'users') loadAdminUsers();
    else if (page === 'withdrawals') loadAdminWithdrawals();
    else if (page === 'bets') loadAdminBets();
    else if (page === 'settings') loadSettingsPage();
}

// ==================== 登录 ====================
document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('adminUsername').value.trim().toLowerCase();
    const password = document.getElementById('adminPassword').value;
    let user = Storage.getUserByName(username);
    if (!user) {
        user = Storage.addUser({ username, password, balance: 1000, role: 'admin' });
        showToast('新管理员已创建并登录！');
    }
    currentUser = user;
    Storage.setCurrentUser(user);
    document.getElementById('adminLoginPage').classList.add('hidden');
    document.getElementById('adminApp').classList.remove('hidden');
    document.getElementById('adminName').textContent = user.username;
    showAdminPage('dashboard');
    showToast('登录成功！');
});

function logout() {
    currentUser = null;
    Storage.clearCurrentUser();
    document.getElementById('adminApp').classList.add('hidden');
    document.getElementById('adminLoginPage').classList.remove('hidden');
}

// ==================== 管理后台功能 ====================
function loadDashboard() {
    const users = Storage.getUsers().filter(u => u.role !== 'admin');
    const bets = Storage.getBets();
    const totalAmount = bets.reduce((sum, b) => sum + b.amount, 0);
    const winBets = bets.filter(b => b.result === 'win');
    const winRate = bets.length > 0 ? Math.round((winBets.length / bets.length) * 100) : 0;
    document.getElementById('dashTotalUsers').textContent = users.length;
    document.getElementById('dashTotalBets').textContent = bets.length;
    document.getElementById('dashTotalAmount').textContent = '¥' + totalAmount.toLocaleString();
    document.getElementById('dashWinRate').textContent = winRate + '%';
    const recentUsers = users.slice(-5).reverse();
    document.getElementById('dashRecentUsers').innerHTML = recentUsers.length === 0 ? '<div class="empty-state">暂无用户</div>' :
        '<table class="data-table"><thead><tr><th>ID</th><th>用户名</th><th>余额</th><th>注册时间</th></tr></thead><tbody>' +
        recentUsers.map(u => '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td style="color:var(--gold);">' + formatMoney(u.balance) + '</td><td>' + formatTime(u.createdAt) + '</td></tr>').join('') + '</tbody></table>';
    const recentBets = bets.slice(-5).reverse();
    document.getElementById('dashRecentBets').innerHTML = recentBets.length === 0 ? '<div class="empty-state">暂无投注</div>' :
        '<table class="data-table"><thead><tr><th>用户</th><th>赛事</th><th>金额</th><th>状态</th></tr></thead><tbody>' +
        recentBets.map(b => { const u = Storage.getUser(b.userId); return '<tr><td>' + (u ? u.username : '未知') + '</td><td>' + b.matchName + '</td><td>' + formatMoney(b.amount) + '</td><td><span class="tag tag-' + (b.status === 'win' ? 'success' : b.status === 'lose' ? 'danger' : 'warning') + '">' + (b.status === 'pending' ? '进行中' : b.status === 'win' ? '已中奖' : '未中奖') + '</span></td></tr>'; }).join('') + '</tbody></table>';
}

function loadAdminUsers() {
    const users = Storage.getUsers().filter(u => u.role !== 'admin');
    const container = document.getElementById('adminUsersList');
    if (users.length === 0) { container.innerHTML = '<div class="empty-state">暂无用户</div>'; return; }
    container.innerHTML = '<table class="data-table"><thead><tr><th>ID</th><th>用户名</th><th>余额</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>' +
        users.map(u => '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td style="color:var(--gold);font-weight:bold;">' + formatMoney(u.balance) + '</td><td>' + (u.banned ? '<span style="color:var(--red);">🔴 已封禁</span>' : '<span style="color:var(--green);">🟢 正常</span>') + '</td><td>' + formatTime(u.createdAt) + '</td><td><div class="action-btns"><button class="action-btn action-btn-balance" onclick="showBalanceModal(' + u.id + ')">💰 余额</button><button class="action-btn action-btn-' + (u.banned ? 'success' : 'warning') + '" onclick="toggleBanUser(' + u.id + ')">' + (u.banned ? '🔓 解封' : '🔒 封禁') + '</button><button class="action-btn action-btn-danger" onclick="deleteUser(' + u.id + ')">🗑️ 删除</button></div></td></tr>').join('') + '</tbody></table>';
}

function toggleBanUser(userId) {
    const user = Storage.getUser(userId);
    if (!user) return;
    const newBanStatus = !user.banned;
    Storage.updateUser(userId, { banned: newBanStatus });
    showToast(newBanStatus ? '用户已封禁' : '用户已解封');
    loadAdminUsers();
}

function showAddUserModal() {
    showModal('添加用户', '<div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="newUsername" placeholder="请输入用户名"></div><div class="form-group"><label class="form-label">密码</label><input type="password" class="form-input" id="newPassword" placeholder="请输入密码"></div><div class="form-group"><label class="form-label">初始余额</label><input type="number" class="form-input" id="newBalance" value="1000" placeholder="请输入初始余额"></div>', function() {
        const username = document.getElementById('newUsername').value.trim().toLowerCase();
        const password = document.getElementById('newPassword').value;
        const balance = parseFloat(document.getElementById('newBalance').value) || 0;
        Storage.addUser({ username, password, balance, role: 'user' });
        showToast('用户添加成功！');
        loadAdminUsers();
    });
}

function showBalanceModal(userId) {
    const user = Storage.getUser(userId);
    if (!user) return;
    showModal('调整余额', '<div style="text-align:center;margin-bottom:20px;"><div style="font-size:14px;color:var(--gray);">当前余额</div><div style="font-size:32px;color:var(--gold);font-weight:bold;">' + formatMoney(user.balance) + '</div></div><div class="form-group"><label class="form-label">调整类型</label><select class="form-input" id="balanceType"><option value="add">➕ 增加余额</option><option value="subtract">➖ 减少余额</option><option value="set">📝 设置余额</option></select></div><div class="form-group"><label class="form-label">金额</label><input type="number" class="form-input" id="balanceAmount" placeholder="请输入金额"></div>', function() {
        const type = document.getElementById('balanceType').value;
        const amount = parseFloat(document.getElementById('balanceAmount').value);
        if (isNaN(amount) || amount < 0) { showToast('请输入有效的金额', 'error'); return; }
        let newBalance;
        switch (type) { case 'add': newBalance = user.balance + amount; break; case 'subtract': newBalance = user.balance - amount; if (newBalance < 0) newBalance = 0; break; case 'set': newBalance = amount; break; }
        Storage.updateUser(userId, { balance: newBalance });
        showToast('余额调整成功！');
        loadAdminUsers();
    });
}

function deleteUser(userId) {
    if (confirm('确定要删除该用户吗？')) {
        Storage.deleteUser(userId);
        showToast('用户已删除');
        loadAdminUsers();
    }
}

function searchUsers() {
    const term = document.getElementById('userSearchInput').value.toLowerCase();
    const users = Storage.getUsers().filter(u => u.role !== 'admin' && u.username.toLowerCase().includes(term));
    const container = document.getElementById('adminUsersList');
    if (users.length === 0) { container.innerHTML = '<div class="empty-state">暂无用户</div>'; return; }
    container.innerHTML = '<table class="data-table"><thead><tr><th>ID</th><th>用户名</th><th>余额</th><th>注册时间</th><th>操作</th></tr></thead><tbody>' +
        users.map(u => '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td style="color:var(--gold);font-weight:bold;">' + formatMoney(u.balance) + '</td><td>' + formatTime(u.createdAt) + '</td><td><div class="action-btns"><button class="action-btn action-btn-balance" onclick="showBalanceModal(' + u.id + ')">💰 余额</button><button class="action-btn action-btn-' + (u.banned ? 'success' : 'warning') + '" onclick="toggleBanUser(' + u.id + ')">' + (u.banned ? '🔓 解封' : '🔒 封禁') + '</button><button class="action-btn action-btn-danger" onclick="deleteUser(' + u.id + ')">🗑️ 删除</button></div></td></tr>').join('') + '</tbody></table>';
}

function loadAdminBets() {
    const bets = Storage.getBets().reverse();
    const container = document.getElementById('adminBetsList');
    if (bets.length === 0) { container.innerHTML = '<div class="empty-state">暂无投注记录</div>'; return; }
    container.innerHTML = '<table class="data-table"><thead><tr><th>ID</th><th>用户</th><th>赛事</th><th>投注内容</th><th>金额</th><th>状态</th><th>时间</th></tr></thead><tbody>' +
        bets.map(b => { const u = Storage.getUser(b.userId); return '<tr><td>' + b.id + '</td><td>' + (u ? u.username : '未知') + '</td><td>' + b.matchName + '</td><td>' + b.selection + '</td><td style="color:var(--gold);">' + formatMoney(b.amount) + '</td><td><span class="tag tag-' + (b.status === 'win' ? 'success' : b.status === 'lose' ? 'danger' : 'warning') + '">' + (b.status === 'pending' ? '进行中' : b.status === 'win' ? '已中奖' : '未中奖') + '</span></td><td>' + formatTime(b.createdAt) + '</td></tr>'; }).join('') + '</tbody></table>';
}

function loadAdminWithdrawals() {
    const status = document.getElementById('withdrawStatusFilter').value;
    let withdrawals = JSON.parse(localStorage.getItem('bp_withdrawals') || '[]').reverse();
    if (status !== 'all') withdrawals = withdrawals.filter(w => w.status === status);
    const container = document.getElementById('adminWithdrawalsList');
    if (withdrawals.length === 0) { container.innerHTML = '<div class="empty-state">暂无提现记录</div>'; return; }
    const methodNames = { bank: '🏦 银行卡', alipay: '💙 支付宝', wechat: '💬 微信' };
    const statusNames = { pending: '⏳ 审核中', approved: '✅ 已通过', rejected: '❌ 已拒绝' };
    const statusTags = { pending: 'warning', approved: 'success', rejected: 'danger' };
    container.innerHTML = '<table class="data-table"><thead><tr><th>ID</th><th>用户</th><th>提现方式</th><th>收款信息</th><th>金额</th><th>状态</th><th>申请时间</th><th>操作</th></tr></thead><tbody>' +
        withdrawals.map(w => {
            const u = Storage.getUser(w.userId);
            return '<tr><td>' + w.id + '</td><td>' + (u ? u.username : '未知') + '<br><small style="color:var(--gray)">ID:' + w.userId + '</small></td><td>' + (methodNames[w.method] || w.method) + '</td><td style="font-size:12px;max-width:200px;word-break:break-all;">' + w.accountInfo + '</td><td style="color:var(--gold);font-weight:bold;">' + formatMoney(w.amount) + '</td><td><span class="tag tag-' + statusTags[w.status] + '">' + statusNames[w.status] + '</span></td><td>' + formatTime(w.createdAt) + '</td><td>' + (w.status === 'pending' ? '<div class="action-btns"><button class="action-btn action-btn-success" onclick="approveWithdrawal(' + w.id + ')">✅ 通过</button><button class="action-btn action-btn-danger" onclick="rejectWithdrawal(' + w.id + ')">❌ 拒绝</button></div>' : '<span style="color:var(--gray)">已处理</span>') + '</td></tr>';
        }).join('') + '</tbody></table>';
}

function approveWithdrawal(withdrawalId) {
    const withdrawals = JSON.parse(localStorage.getItem('bp_withdrawals') || '[]');
    const idx = withdrawals.findIndex(w => w.id === withdrawalId);
    if (idx !== -1) {
        withdrawals[idx].status = 'approved';
        withdrawals[idx].processedAt = new Date().toISOString();
        localStorage.setItem('bp_withdrawals', JSON.stringify(withdrawals));
        showToast('提现申请已通过！');
        loadAdminWithdrawals();
    }
}

function rejectWithdrawal(withdrawalId) {
    const withdrawals = JSON.parse(localStorage.getItem('bp_withdrawals') || '[]');
    const idx = withdrawals.findIndex(w => w.id === withdrawalId);
    if (idx !== -1) {
        const w = withdrawals[idx];
        const user = Storage.getUser(w.userId);
        if (user) {
            Storage.updateUser(user.id, { balance: user.balance + w.amount });
        }
        withdrawals[idx].status = 'rejected';
        withdrawals[idx].processedAt = new Date().toISOString();
        localStorage.setItem('bp_withdrawals', JSON.stringify(withdrawals));
        showToast('提现申请已拒绝，金额已退回用户余额');
        loadAdminWithdrawals();
    }
}

function searchAdminBets() {
    const term = document.getElementById('betSearchInput').value.toLowerCase();
    const status = document.getElementById('betStatusFilter').value;
    let bets = Storage.getBets();
    if (term) bets = bets.filter(b => { const u = Storage.getUser(b.userId); return (u && u.username.toLowerCase().includes(term)) || b.matchName.toLowerCase().includes(term); });
    if (status) bets = bets.filter(b => b.status === status || b.result === status);
    bets = bets.reverse();
    const container = document.getElementById('adminBetsList');
    if (bets.length === 0) { container.innerHTML = '<div class="empty-state">暂无投注记录</div>'; return; }
    container.innerHTML = '<table class="data-table"><thead><tr><th>ID</th><th>用户</th><th>赛事</th><th>投注内容</th><th>金额</th><th>状态</th><th>时间</th></tr></thead><tbody>' +
        bets.map(b => { const u = Storage.getUser(b.userId); return '<tr><td>' + b.id + '</td><td>' + (u ? u.username : '未知') + '</td><td>' + b.matchName + '</td><td>' + b.selection + '</td><td style="color:var(--gold);">' + formatMoney(b.amount) + '</td><td><span class="tag tag-' + (b.status === 'win' ? 'success' : b.status === 'lose' ? 'danger' : 'warning') + '">' + (b.status === 'pending' ? '进行中' : b.status === 'win' ? '已中奖' : '未中奖') + '</span></td><td>' + formatTime(b.createdAt) + '</td></tr>'; }).join('') + '</tbody></table>';
}

// ==================== 获胜率设置 ====================
function loadSettingsPage() {
    const globalRate = localStorage.getItem('bp_globalWinRate') || '50';
    document.getElementById('globalWinRate').value = globalRate;
    document.getElementById('globalWinRateValue').textContent = globalRate + '%';
    const select = document.getElementById('winRateUserSelect');
    const users = Storage.getUsers().filter(u => u.role !== 'admin');
    select.innerHTML = '<option value="">请选择用户</option>' + users.map(u => '<option value="' + u.id + '">' + u.username + ' (当前: ' + (u.winRate !== undefined ? u.winRate + '%' : '跟随全局') + ')</option>').join('');
}

function saveGlobalWinRate() {
    const rate = document.getElementById('globalWinRate').value;
    localStorage.setItem('bp_globalWinRate', rate);
    showToast('全局获胜率已设置为 ' + rate + '%');
}

function loadUserWinRate() {
    const userId = parseInt(document.getElementById('winRateUserSelect').value);
    if (!userId) return;
    const user = Storage.getUser(userId);
    const rate = user.winRate !== undefined ? user.winRate : parseInt(localStorage.getItem('bp_globalWinRate') || '50');
    document.getElementById('userWinRate').value = rate;
    document.getElementById('userWinRateValue').textContent = rate + '%';
}

function saveUserWinRate() {
    const userId = parseInt(document.getElementById('winRateUserSelect').value);
    if (!userId) { showToast('请先选择用户', 'error'); return; }
    const rate = parseInt(document.getElementById('userWinRate').value);
    Storage.updateUser(userId, { winRate: rate });
    showToast('用户获胜率已设置为 ' + rate + '%');
    loadSettingsPage();
}

function resetUserWinRate() {
    const userId = parseInt(document.getElementById('winRateUserSelect').value);
    if (!userId) { showToast('请先选择用户', 'error'); return; }
    const users = Storage.getUsers();
    const idx = users.findIndex(u => u.id === userId);
    if (idx !== -1) { delete users[idx].winRate; localStorage.setItem('bp_users', JSON.stringify(users)); }
    showToast('已重置为全局获胜率');
    loadSettingsPage();
}

// ==================== 初始化 ====================
function init() {
    const savedUser = Storage.getCurrentUser();
    if (savedUser) {
        currentUser = savedUser;
        document.getElementById('adminLoginPage').classList.add('hidden');
        document.getElementById('adminApp').classList.remove('hidden');
        document.getElementById('adminName').textContent = savedUser.username;
        loadDashboard();
    } else {
        document.getElementById('adminLoginPage').classList.remove('hidden');
    }
    setInterval(function() {
        const el = document.getElementById('currentTime');
        if (el) el.textContent = new Date().toLocaleString('zh-CN');
    }, 1000);
}

init();
</script>
</body>
</html>
