<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娱乐投注平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e; --secondary: #16213e; --accent: #0f3460;
            --gold: #d4af37; --gold-light: #f4d03f; --red: #e74c3c;
            --green: #27ae60; --white: #ffffff; --gray: #95a5a6;
            --dark-bg: #0d1117; --card-bg: #161b22; --border: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--dark-bg); color: var(--white); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            padding: 20px;
        }
        .container {
            text-align: center; max-width: 600px; width: 100%;
        }
        .logo {
            font-size: 64px; margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 36px; color: var(--gold); margin-bottom: 10px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: var(--gray); font-size: 16px; margin-bottom: 50px;
        }
        .cards {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
        }
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px; padding: 40px 30px; cursor: pointer;
            transition: all 0.4s ease; text-decoration: none; color: var(--white);
            display: block; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.4s;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 20px 60px rgba(212,175,55,0.2);
        }
        .card:hover::before { opacity: 1; }
        .card-icon {
            font-size: 56px; margin-bottom: 20px; display: block;
        }
        .card-title {
            font-size: 22px; font-weight: bold; color: var(--gold); margin-bottom: 10px;
        }
        .card-desc {
            font-size: 14px; color: var(--gray); line-height: 1.6;
        }
        .card-client { border-top: 3px solid var(--gold); }
        .card-admin { border-top: 3px solid var(--accent); }
        .footer {
            margin-top: 50px; color: var(--gray); font-size: 13px;
        }
        .footer a { color: var(--gold); text-decoration: none; }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .particle {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            background: var(--gold); opacity: 0.3;
            animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .container { position: relative; z-index: 1; }
        @media (max-width: 500px) {
            .cards { grid-template-columns: 1fr; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>娱乐投注平台</h1>
        <p class="subtitle">体育投注 · 彩票游戏 · 棋牌娱乐</p>
        <div class="cards">
            <a class="card card-client" href="客户端.html">
                <span class="card-icon">🎰</span>
                <div class="card-title">用户端</div>
                <div class="card-desc">体育投注、彩票游戏、<br>棋牌娱乐、在线提现</div>
            </a>
            <a class="card card-admin" href="管理后台.html">
                <span class="card-icon">⚙️</span>
                <div class="card-title">管理后台</div>
                <div class="card-desc">用户管理、提现审核、<br>投注记录、系统设置</div>
            </a>
        </div>
        <div class="footer">
            <p>本平台仅用于娱乐目的</p>
        </div>
    </div>
    <script>
        // 粒子动画
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 8 + 6) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
